<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell App</title>

    <link
      rel="shortcut icon"
      href="./assets/icon/header-logo.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__imgContainer">
        <img
          src="./assets/icon/header-logo.svg"
          alt="Bestelllogo"
          class="header__img"
        />
        <img
          src="./assets/icon/header-menu.svg"
          alt="Burgermenu ist ein reiner Platzhalter"
          class="header__img"
        />
      </div>
    </header>
    <main class="main">
      <div>
        <img
          class="hero__logo"
          src="./assets/img/hero-logo.png"
          alt="Burgerhouse Logo"
        />
      </div>
      <section class="hero">
        <div class="hero__imageContainer">
          <img
            class="hero__image"
            src="./assets/img/hero-image.png"
            alt="Burger und Pizza auf einem Tisch"
          />
        </div>
        <div class="hero__title">
          <div class="hero__titleInnerContainer">
            <h1>Burger<span>House</span></h1>
            <div class="hero__reviewContainer">
              <img
                src="./assets/icon/star-icon.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="hero__reviewRating">4,1</p>
              <p>(317)</p>
            </div>
          </div>
          <p class="hero__subtitle">
            The best of Burgers, Pizza and Greens, all in one great place.
          </p>
        </div>
      </section>
      <section class="content">
        <section id="catWrapper-id" class="content__catWrapper"></section>
        <aside id="basketWrapper-id" class="content__basketWrapper"></aside>
      </section>
      <dialog id="dialog-id" class="dialog">
        <header class="dialog__header">
          <button class="quantityBtn quantityBtn--close" data-action="DIALOG_CLOSE">
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M8 9.70342L2.03802 15.6654C1.81496 15.8885 1.53105 16 1.18631 16C0.841572 16 0.557668 15.8885 0.334601 15.6654C0.111534 15.4423 0 15.1584 0 14.8137C0 14.4689 0.111534 14.185 0.334601 13.962L6.29658 8L0.334601 2.03802C0.111534 1.81496 0 1.53105 0 1.18631C0 0.841572 0.111534 0.557668 0.334601 0.334601C0.557668 0.111534 0.841572 0 1.18631 0C1.53105 0 1.81496 0.111534 2.03802 0.334601L8 6.29658L13.962 0.334601C14.185 0.111534 14.4689 0 14.8137 0C15.1584 0 15.4423 0.111534 15.6654 0.334601C15.8885 0.557668 16 0.841572 16 1.18631C16 1.53105 15.8885 1.81496 15.6654 2.03802L9.70342 8L15.6654 13.962C15.8885 14.185 16 14.4689 16 14.8137C16 15.1584 15.8885 15.4423 15.6654 15.6654C15.4423 15.8885 15.1584 16 14.8137 16C14.4689 16 14.185 15.8885 13.962 15.6654L8 9.70342Z"
                fill="#FDEADC"
              />
            </svg>
          </button>
        </header>
        <main class="dialog__main">
          <img
            class="dialog__carRideKeyFr"
            src="./assets/icon/ordered-car-icon.png"
            alt="A yellow burger bus"
          />
          <div class="dialog__textBox">
            <strong>Order confirmed!</strong>
            <p>Your food is on the way!</p>
          </div>
        </main>
      </dialog>
    </main>
    <footer class="footer">
      <div class="footer__innerContainer">
        <p class="footer__copyright">
          <span
            ><img
              src="./assets/icon/copyright-icon.svg"
              alt=""
              aria-hidden="true" /></span
          >2026 BurgerHouse
        </p>
        <nav>
          <ul class="footer__navList">
            <li>
              <a href="#">Imprint</a>
            </li>
            <li>
              <a href="#">Cookie Preferences</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </body>
</html>
